services:
  ubuntu-xfce-vnc:
    build:
      context: .
      dockerfile: Dockerfile.ubuntu.xfce.vnc
    ports:
      - "5901:5901"   # Direct VNC viewer
      - "6901:6901"   # noVNC browser client → http://localhost:6901
    # Prevent Chrome/browser crashes at high resolutions
    shm_size: "256m"
    environment:
      - VNC_PW=vncpassword
      - VNC_RESOLUTION=1280x1024
      - VNC_COL_DEPTH=24
      - VNC_VIEW_ONLY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6901/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
